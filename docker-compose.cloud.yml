# Docker Compose for Oracle Cloud deployment (VM 1 — App Server)
# Database runs on VM 2 (separate, not in this compose file)

services:
  # FastAPI backend
  pedkai-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: requirements-cloud.txt
    container_name: pedkai-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Next.js static frontend builder
  # Builds once, copies static files to shared volume for Caddy
  pedkai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://pedk.ai}
    container_name: pedkai-frontend
    volumes:
      - frontend_static:/srv/frontend
    # This container exits after build — it just holds the static files
    command: ["sh", "-c", "cp -r /srv/frontend/* /srv/frontend/ 2>/dev/null; echo 'Frontend files ready'; sleep infinity"]
    restart: unless-stopped

  # Kafka (KRaft mode — no Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: pedkai-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  kafka_data:
  frontend_static:
