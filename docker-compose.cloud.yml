# Docker Compose for Oracle Cloud deployment (VM 1 — App Server)
# Database runs on VM 2 (separate, not in this compose file).
# All services run in Docker — no native Caddy or Ollama installs required.

services:

  # Caddy reverse proxy — TLS termination + API/frontend routing
  caddy:
    image: caddy:2-alpine
    container_name: pedkai-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Cloudflare origin certs — upload once to host at /etc/caddy/certs/
      - /etc/caddy/certs:/etc/caddy/certs:ro
      - frontend_static:/srv/frontend:ro
      - caddy_data:/data
    depends_on:
      pedkai-backend:
        condition: service_healthy
      pedkai-frontend:
        condition: service_started
    restart: unless-stopped

  # FastAPI backend
  pedkai-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: requirements-cloud.txt
    container_name: pedkai-backend
    env_file: .env
    volumes:
      # Persistent HuggingFace cache — T-VEC weights are ~6GB and must
      # survive container restarts. HF_HOME in .env points here.
      - hf_cache:/home/appuser/.cache/huggingface
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Next.js static frontend builder
  # Builds once, copies static files to shared volume for Caddy
  pedkai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pedkai-frontend
    volumes:
      - frontend_static:/srv/frontend
    command: ["sh", "-c", "rm -rf /srv/frontend/* && cp -r /build-output/* /srv/frontend/ && echo 'Frontend files ready' && sleep infinity"]
    restart: unless-stopped

  # Kafka (KRaft mode — no Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: pedkai-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_MS: 14400000
      KAFKA_LOG_SEGMENT_BYTES: 104857600
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Ollama — on-prem LLM inference (TSLAM-Mini-2B)
  # GGUF must be uploaded to TSLAM_GGUF_DIR on the host before first start.
  # On first run the entrypoint imports the model; subsequent restarts skip import.
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: pedkai-ollama
    volumes:
      - ollama_data:/root/.ollama
      # Host path containing tslam-mini-2b-q4km.gguf — defaults to /opt/tslam
      - ${TSLAM_GGUF_DIR:-/opt/tslam}:/opt/tslam:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # Telemetry Replay Service — streams historical Parquet data into Kafka
  # Run on-demand: docker compose -f docker-compose.cloud.yml run --rm pedkai-replay
  pedkai-replay:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: requirements-cloud.txt
    container_name: pedkai-replay
    env_file: .env
    volumes:
      - ${TELEMETRY_DATA_PATH:-/home/ubuntu/Pedkai-data/output}:/data:ro
    environment:
      TELEMETRY_DATA_PATH: /data
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REPLAY_CHECKPOINT_DIR: /tmp
    command: ["python", "-m", "backend.app.telemetry.cli"]
    healthcheck:
      disable: true
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

volumes:
  kafka_data:
  frontend_static:
  hf_cache:
  ollama_data:
  caddy_data:
