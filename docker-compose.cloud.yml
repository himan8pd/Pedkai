# Docker Compose for Oracle Cloud deployment (VM 1 — App Server)
# Database runs on VM 2 (separate, not in this compose file)

services:
  # FastAPI backend
  pedkai-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: requirements-cloud.txt
    container_name: pedkai-backend
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Next.js static frontend builder
  # Builds once, copies static files to shared volume for Caddy
  pedkai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pedkai-frontend
    volumes:
      - frontend_static:/srv/frontend
    # Copy fresh build output to volume on every start, then idle
    command: ["sh", "-c", "rm -rf /srv/frontend/* && cp -r /build-output/* /srv/frontend/ && echo 'Frontend files ready' && sleep infinity"]
    restart: unless-stopped

  # Kafka (KRaft mode — no Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: pedkai-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_MS: 14400000
      KAFKA_LOG_SEGMENT_BYTES: 104857600
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Ollama for inference
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: pedkai-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Telemetry Replay Service — streams historical Parquet data into Kafka
  # Run on-demand: docker compose -f docker-compose.cloud.yml run --rm pedkai-replay
  # Or start with the stack: docker compose -f docker-compose.cloud.yml up pedkai-replay
  pedkai-replay:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: requirements-cloud.txt
    container_name: pedkai-replay
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${TELEMETRY_DATA_PATH:-/home/ubuntu/Pedkai-data/output}:/data:ro
    environment:
      TELEMETRY_DATA_PATH: /data
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REPLAY_CHECKPOINT_DIR: /tmp
    command: ["python", "-m", "backend.app.telemetry.cli"]
    healthcheck:
      disable: true
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

volumes:
  kafka_data:
  frontend_static:
  ollama_data:
